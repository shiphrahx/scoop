name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    # The RLS suite runs the real migrations against a real Postgres and checks
    # one user cannot reach another's rows. Without a database it skips, so it
    # has to be here or it never runs at all.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: scoop_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/scoop_test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      # Coverage thresholds are a ratchet (see vitest.config.ts) — a change that
      # drops coverage of the maths fails here rather than merging quietly.
      - name: Run tests
        run: npm run test:coverage

      # Nothing else proves the app still compiles: a type error inside a server
      # component or a bad import never shows up in the unit tests.
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: build-only-placeholder
