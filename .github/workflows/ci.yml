name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      # Coverage thresholds are a ratchet (see vitest.config.ts) — a change that
      # drops coverage of the maths fails here rather than merging quietly.
      - name: Run tests
        run: npm run test:coverage

      # Nothing else proves the app still compiles: a type error inside a server
      # component or a bad import never shows up in the unit tests.
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: build-only-placeholder
